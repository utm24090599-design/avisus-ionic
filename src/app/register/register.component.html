<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register</title>
  <link rel="stylesheet" href="register.component.scss">
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Lato:wght@300;400;700&display=swap"
    rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
</head>

<main class="flex justify-center items-center w-screen h-screen select-none">

  <div class="Square">


    <div class="card-header">
      <h1>Create Account</h1>
      <p>Fill in your details to register</p>
    </div>


    <div class="inputs">

      <div class="field">
        <label for="email">E-Mail</label>

        <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="new-password">
      </div>

      <div class="field">
        <label for="password-confirm">Confirm Password</label>
        <input type="password" id="password-confirm" placeholder="••••••••" autocomplete="new-password">
      </div>


      <p class="linktolog">
        Already have an account? <a href="/login">Login here</a>
      </p>

    </div>

    <button type="submit">
      <span class="material-symbols-outlined" style="font-size:1.2rem">how_to_reg</span>
      Submit
    </button>

    <div class="avisusimg">

      <img src="/assets/Se avisa que1.jpg" alt="se avisa que">
    </div>

  </div>

</main>
